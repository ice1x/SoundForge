<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundForge — редактор со статистикой из коробки</title>
<style>
  :root{
    --bg:#0b0d10;
    --panel:#12161b;
    --panel-2:#171c22;
    --line:#232b33;
    --ink:#e7ece9;
    --dim:#7d8a92;
    --amber:#ffb454;      /* signal / waveform */
    --amber-soft:#8a5a1f;
    --sel:rgba(255,180,84,0.14);
    --green:#57d9a3;
    --red:#ff6b6b;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono","Menlo",Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:13px;display:flex;flex-direction:column;overflow:hidden;
  }
  header{
    display:flex;align-items:center;gap:14px;padding:10px 16px;
    border-bottom:1px solid var(--line);background:var(--panel);
  }
  header .logo{font-family:var(--mono);font-weight:600;letter-spacing:.5px;color:var(--amber)}
  header .logo b{color:var(--ink)}
  header .meta{font-family:var(--mono);color:var(--dim);font-size:11px}
  header .spacer{flex:1}
  .toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  button{
    font-family:var(--sans);font-size:12px;color:var(--ink);
    background:var(--panel-2);border:1px solid var(--line);border-radius:6px;
    padding:7px 11px;cursor:pointer;transition:.12s;white-space:nowrap;
  }
  button:hover:not(:disabled){border-color:#33404a;background:#1c232a}
  button:active:not(:disabled){transform:translateY(1px)}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.primary{border-color:var(--amber-soft);color:var(--amber)}
  button.rec{border-color:#5a2020;color:var(--red)}
  /* Error banner: replaces the prototype's alert() so a failure never blocks the UI. */
  .errbar{
    display:none;padding:8px 16px;background:#2a1416;border-bottom:1px solid #5a2020;
    color:var(--red);font-family:var(--mono);font-size:11px;
  }
  .errbar.on{display:block}
  .main{flex:1;display:flex;min-height:0}
  .left{flex:1;display:flex;flex-direction:column;min-width:0;padding:14px;gap:10px}
  .wavewrap{
    position:relative;flex:1;background:var(--panel);border:1px solid var(--line);
    border-radius:8px;overflow:hidden;min-height:180px;
  }
  /* Two stacked canvases: the envelope is expensive to build and only changes on
     zoom/scroll/resize, while the selection overlay repaints on every drag frame.
     Keeping them separate is what lets a drag stay at 60 fps. */
  canvas{position:absolute;inset:0;display:block;width:100%;height:100%}
  #overlay{cursor:text}
  .drop-hint{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:8px;color:var(--dim);text-align:center;pointer-events:none;
  }
  .drop-hint b{color:var(--ink)}
  .transport{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .transport .time{font-family:var(--mono);color:var(--dim);font-size:12px;margin-left:6px}
  .edits{display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:10px}
  .right{
    width:300px;border-left:1px solid var(--line);background:var(--panel);
    display:flex;flex-direction:column;
  }
  .stat-head{
    padding:11px 16px;border-bottom:1px solid var(--line);
    font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--dim);
    text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;
  }
  .stat-head .live{color:var(--green);font-size:10px}
  .stat-head .live::before{content:"●";margin-right:5px;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .chrow{
    display:flex;align-items:center;gap:8px;padding:8px 16px;
    border-bottom:1px solid var(--line);color:var(--dim);font-size:12px;
  }
  select{
    flex:1;font-family:var(--sans);font-size:12px;color:var(--ink);
    background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:5px 8px;
  }
  select:disabled{opacity:.4}
  .stats{padding:6px 0;overflow:auto;flex:1}
  .row{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:7px 16px;gap:12px;
  }
  .row:nth-child(odd){background:var(--panel-2)}
  .row .k{color:var(--dim);font-size:12px}
  .row .v{font-family:var(--mono);font-size:13px;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums}
  .row.hi .v{color:var(--amber)}
  .row .u{color:var(--dim);font-size:11px;margin-left:3px}
  .scope-note{padding:10px 16px;color:var(--dim);font-size:11px;border-top:1px solid var(--line);line-height:1.5}
  .kbd{font-family:var(--mono);font-size:10px;color:var(--dim)}
</style>
</head>
<body>
<header>
  <div class="logo"><b>Sound</b>Forge</div>
  <div class="meta" id="fileMeta">нет файла</div>
  <div class="spacer"></div>
  <div class="toolbar">
    <button id="openBtn">Открыть файл…</button>
    <button id="closeBtn" disabled>Закрыть</button>
    <!-- Playback, recording, edits and export are backend features still to come; the
         controls are shown disabled so the layout matches the target design. Deliberately
         no task numbers here: the README renumbers tasks whenever one is inserted. -->
    <button id="recBtn" class="rec" disabled title="Нативная запись — пока не реализована">● Запись</button>
    <button id="saveBtn" class="primary" disabled title="Экспорт WAV — пока не реализован">Сохранить WAV</button>
  </div>
</header>

<div class="errbar" id="errBar"></div>

<div class="main">
  <div class="left">
    <div class="wavewrap" id="wavewrap">
      <canvas id="wave"></canvas>
      <canvas id="overlay"></canvas>
      <div class="drop-hint" id="hint">
        <b>Перетащи сюда аудиофайл</b>
        <span>или нажми «Открыть файл…»</span>
        <span class="kbd">выдели мышкой участок → статистика справа считается сама</span>
        <span class="kbd">колесо — масштаб, shift+колесо — прокрутка</span>
      </div>
    </div>

    <div class="transport">
      <button id="playBtn" disabled title="Играть выделение (или весь файл) — пробел">▶ Играть</button>
      <button id="selAllBtn" disabled>Выделить всё</button>
      <button id="clrSelBtn" disabled>Снять выделение</button>
      <button id="fitBtn" disabled>Весь файл</button>
      <button id="zoomSelBtn" disabled>Масштаб по выделению</button>
      <span class="time" id="timeReadout">—</span>
    </div>

    <div class="edits">
      <button disabled class="ed" title="Правки — пока не реализованы">Нормализовать</button>
      <button disabled class="ed" title="Правки — пока не реализованы">Fade In</button>
      <button disabled class="ed" title="Правки — пока не реализованы">Fade Out</button>
      <button disabled class="ed" title="Правки — пока не реализованы">Тишина</button>
      <button disabled class="ed" title="Правки — пока не реализованы">Обрезать до выделения</button>
      <button disabled id="undoBtn" title="Отмена правок — пока не реализована">↶ Отменить</button>
    </div>
  </div>

  <div class="right">
    <div class="stat-head"><span>Statistics</span><span class="live">live</span></div>
    <div class="chrow"><span>Канал</span><select id="chSel" disabled></select></div>
    <div class="stats" id="statsBody">
      <div class="row"><span class="k">Загрузи звук, чтобы увидеть цифры</span></div>
    </div>
    <div class="scope-note" id="scopeNote">Область: —</div>
  </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
